<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PageTurner ❤︎</title>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel="icon" type="images/jpg" href="./src/icon.png">
    <script src="script.js"></script>
    <style>
        

    .overlay {
    position: relative;
    float: right;
    z-index: 3;
    transition: opacity 500ms;
    visibility: hidden;
    opacity: 0;
    }
    .overlay:target {
    visibility: visible;
    opacity: 1;
    z-index: 3;
    }

    .popup {
    padding: 20px;
    background: #ffb515;
    border-radius: 5px;
    width: 30%;
    position: relative;
    transition: all 5s ease-in-out;
    }

    .popup h2 {
    margin-top: 0;
    color: #333;
    font-family: Tahoma, Arial, sans-serif;
    }
    .popup .close {
    position: absolute;
    top: 20px;
    right: 30px;
    transition: all 200ms;
    font-size: 30px;
    font-weight: bold;
    text-decoration: none;
    color: #333;
    }
    .popup .close:hover {
    color: #ffffff;
    }
    .popup .content {
    max-height: 30%;
    overflow: auto;
    }


    .box{
        width: 70%;
    }
    .popup{
        width: 70%;
    }
    }
    </style>
</head>
<body>



	<a class="button" href="#modal1">Add to Car</i></a>



	<a class="button" href="#modal2">Let me Pop up 2</a>



<div id="modal1" class="overlay">
	<div class="popup">
		<h2>Here i am</h2>
		<a class="close" href="#">&times;</a>
		<div class="content">
			Thank to pop me out of that button, but now i'm done so you can close this window.
		</div>
	</div>
</div>

<div id="modal2" class="overlay">
	<div class="popup">
		<h2>Here i am</h2>
		<a class="close" href="#">&times;</a>
		<div class="content">
			@
		</div>
	</div>
</div>
</body> 
</html>
